<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <title>Rstat</title>
  <link rel="stylesheet" href="index.css" />
  <link rel="icon" alt="믺구 이미지" href="./img/mikuFvi.ico">
</head>
<body>
  <header class="site-header">
    <div class="site-logo">Rstat</div>
    <nav class="site-nav">
      <a href="#main">Main</a>
      <a href="#H">Temp</a>
      <a href="#G">Graphs</a>
    </nav>
  </header>

  <section id="main" class="hero anchor-offset">
    <!-- 왼쪽 -->
    <div  class="hero__left">
      <h1>
        Live Temperature & <br />
        <span>Humidity</span>
      </h1>

      <p class="hero__subtitle">만든 놈 방 온도 좀 보세요!</p>

      <div class="hero__meta">
        <span>My Room, Korea</span>
        <span id="latest-time">--</span>
      </div>
    </div>

    <div class="hero__right">
      <img src="img/welcomeMikuTest.png">
    </div>
  </section>
  
  <section id="H" class="hero hero--secondary anchor-offset">
    <h1>Tempe & Humid</h1>
    <div class="hero__mid">
      <div class="stat-cards">
        <div class="stat-card stat-card--temp">
          <p>Temperature</p>
          <h2 id="temp-value">--</h2>
          <span class="stat-badge">Moderate</span>
        </div>

        <div class="stat-card stat-card--humid">
          <p>Humidity</p>
          <h2 id="humidity-value">--</h2>
          <span class="stat-badge">Moderate</span>
        </div>

        <div class="stat-card stat-card--temp">
          <p>Server Temp</p>
          <h2 id="server-temp-value">--</h2>
          <span class="stat-badge">Moderate</span>
        </div>

      </div>
    </div>

    <div id="G" class="charts anchor-offset">
      <h1>Graphs</h1>

      <div class="chart">
        <h2 class="chart__title">Temperature</h2>
        <canvas id="temp-chart"></canvas>
      </div>
      <div class="chart">
        <h2 class="chart__title">Humidity</h2>
        <canvas id="humid-chart"></canvas>
      </div>
    </div>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.5.0/Chart.min.js"></script>
  <script src="../static/test-chart.js"></script>

  <footer id="About" class="site-footer anchor-offset">
    <div class="footer__content">
      <div class="footer__comment">
        <label class="footer__label" for="footer-comment">Comment</label>
        <p>눈으로 만들어 봤습니다, 재미로 즐겨주세요</p>
      </div>
      <div class="footer__meta">© 2026 ecilla</div>
    </div>
  </footer>
</body>

</html>
